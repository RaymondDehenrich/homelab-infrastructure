services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: Domain.example.com
      SIGNUPS_ALLOWED: false
      INVITATIONS_ALLOWED: false
    volumes:
      - ./vw-data/:/data/
    ports:
      - 8811:80
